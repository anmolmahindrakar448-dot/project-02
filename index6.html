<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 6</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }

        .right {
            display: flex;
            justify-content: left;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            font-weight: bold;
            font-size: 25px;
            height: 10vh;
            align-items: center;
            background: rgb(58, 8, 222);
        }

        p {
            margin-left: 10px;
            color: white;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            align-content: center;
            height: 100vh;
            flex-direction: column;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .header {
            /* background: linear-gradient(135deg, #6a11cb, #ffffff); */
            color: black;
            padding: 15px;
            margin-bottom: 10px;
            font-size: 30px;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            font-weight: bold;
        }

        .input-box {
            display: flex;
            padding: 10px;
            gap: 6px;
        }

        input {
            flex: 1;
            padding: 10px;
            border: 1 px solid#ccc;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            border: 1px solid black;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover {
            background-color: #6a11cb;

        }

        ul {
            list-style: none;
            padding: 0 10 10px;
        }

        li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: none;
            margin: 8px 0;
            padding: 10px;
            gap: 20px;
        }

        .delete {
            background: red;
            padding: 5px 8px;
            border-radius: 10px;
        }

        .delete:hover {
            background: darkred;
        }

        footer {
            background: black;
            color: white;
            height: 10vh;
            align-items: center;
            display: flex;
            justify-content: center;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <header>
        <nav>
            <div class="right">
                <p>Anmol</p>
            </div>
        </nav>
    </header>
    <div class="container">
        <div class="header">My Tasks</div>
        <div class="input-box">
            <input type="text" id="taskInput" placeholder="Add a New Task..">
            <button onclick="addTask()"> Add</button>
        </div>
        <ul id="TaskList"></ul>
    </div>
    <footer>WebNova Studio | Designed by Anmol A.Mahindrakar</footer>
    <script>
        function addTask() {
            let input = document.getElementById("taskInput");
            let taskText = input.value.trim();
            if (taskText == "") {
                alert("Enter The Task");
                return;
            }
            let li = document.createElement("li");
            li.innerHTML = `
            <span>${taskText}</span>
            <button class="delete" onclick="deleteTask(this)">X</button>
            `;
            document.getElementById("TaskList").appendChild(li);
            input.value = "";
        }
        function deleteTask(btn) {
            let li = btn.parentElement;
            li.style.opacity = "0";
            li.style.transform = "translateX(100px)";
            setTimeout(() => {
                li.remove();
            }, 300);
        }

    </script>
</body>

</html>
